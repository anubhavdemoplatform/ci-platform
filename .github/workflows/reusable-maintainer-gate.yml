# Reusable Maintainer Gate workflow
# HARD BLOCKER — fails the check until a maintainer from the config file has approved.
# Maintainer list is read from .github/ai-review-config.yml in the consumer repo.
# Triggered on pull_request_target (via caller) so it re-evaluates on every review event.
name: Maintainer Gate

on:
  workflow_call:
    inputs:
      config-path:
        description: "Path to the config file containing the maintainers list"
        type: string
        required: false
        default: ".github/ai-review-config.yml"

jobs:
  maintainer-approval:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check maintainer approval
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setFailed('No pull_request in event payload.');
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const configPath = '${{ inputs.config-path }}';

            // ---- 1. Fetch maintainers list from config file ----
            core.info(`Reading maintainers from ${configPath}...`);
            let configContent;
            try {
              const resp = await github.rest.repos.getContent({
                owner, repo, path: configPath,
                ref: pr.base.ref,
              });
              configContent = Buffer.from(resp.data.content, 'base64').toString('utf8');
            } catch (e) {
              core.setFailed(
                `Could not read ${configPath}: ${e.message}\n` +
                'Create this file with a "maintainers:" list to use the maintainer gate.'
              );
              return;
            }

            // ---- 2. Parse maintainers list (simple YAML parsing — no deps) ----
            const maintainers = [];
            const inMaintainers = configContent.split('\n');
            let inSection = false;
            for (const line of inMaintainers) {
              const trimmed = line.trim();
              if (trimmed === 'maintainers:' || trimmed.startsWith('maintainers:')) {
                inSection = true;
                continue;
              }
              if (inSection) {
                const match = trimmed.match(/^-\s+(.+)$/);
                if (match) {
                  maintainers.push(match[1].trim());
                } else if (trimmed !== '' && !trimmed.startsWith('#')) {
                  break; // End of maintainers list
                }
              }
            }

            if (maintainers.length === 0) {
              core.setFailed(
                `No maintainers found in ${configPath}.\n` +
                'Add a "maintainers:" section with GitHub usernames.'
              );
              return;
            }

            core.info(`Maintainers: ${maintainers.join(', ')}`);

            // ---- 3. Fetch all reviews on this PR ----
            const reviews = await github.paginate(
              github.rest.pulls.listReviews,
              { owner, repo, pull_number: pr.number, per_page: 100 }
            );

            // ---- 4. Check for an approved review from a maintainer ----
            // Only the latest review per user counts (a maintainer might
            // approve, then request changes, then approve again).
            const latestByUser = new Map();
            for (const review of reviews) {
              const login = review.user?.login;
              if (!login) continue;
              // Keep overwriting — reviews are returned chronologically
              latestByUser.set(login, review.state);
            }

            const approvedMaintainers = maintainers.filter(
              m => latestByUser.get(m) === 'APPROVED'
            );

            if (approvedMaintainers.length > 0) {
              core.info(
                `Maintainer approval found: ${approvedMaintainers.join(', ')}`
              );
            } else {
              const pending = maintainers.join(', ');
              core.setFailed(
                `Blocked: no maintainer has approved this PR.\n` +
                `Requires an approving review from one of: ${pending}`
              );
            }
